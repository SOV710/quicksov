# quicksov daemon configuration
# Copy to $XDG_CONFIG_HOME/quicksov/daemon.toml (usually ~/.config/quicksov/daemon.toml)

[daemon]
log_level = "info"
# socket_path defaults to $XDG_RUNTIME_DIR/quicksov/daemon.sock
# If you override it, export the same absolute path as QSOV_SOCKET before
# starting quickshell so the QML IPC client can find qsovd.

# ---------------------------------------------------------------------------
# Screen role mapping
#
# Option A (simple): set main_screen to your primary output name.
# All other outputs are implicitly treated as auxiliary screens.
# Use `niri msg outputs` to find your connector names.
#
# Option B (explicit): use [[screens.mapping]] entries to assign each screen
# a role manually ("main" or "aux").
#
# Option A takes priority over Option B when both are present.
# Remove or leave empty to show MainBar on every screen (prototype default).
# ---------------------------------------------------------------------------

# Option A — recommended for single-main setups:
# [screens]
# main_screen = "DP-1"

# Option B — explicit per-screen mapping:
# [[screens.mapping]]
# match_name = "DP-1"
# role       = "main"
#
# [[screens.mapping]]
# match_name = "eDP-1"
# role       = "aux"

# ---------------------------------------------------------------------------
# PowerDock actions
# Set any action to false to keep the button visible but disabled in the UI.
# ---------------------------------------------------------------------------

# [power]
# lock = true
# suspend = true
# logout = true
# reboot = true
# shutdown = true

# ---------------------------------------------------------------------------
# Wallpaper — source/view wallpaper renderer config
# The daemon indexes images/videos, directly supervises qsov-wallpaper-renderer, and exposes
# per-output view bindings. If no sources/views are configured, every output
# falls back to the first indexed entry in the wallpaper directory.
# ---------------------------------------------------------------------------

# [services.wallpaper]
# directory = "$HOME/.config/quicksov/wallpapers"
# transition = "fade"
# transition_duration_ms = 320
# renderer = "wayland-ffmpeg"
# decode_backend_order = ["vaapi", "cuda", "software"]
# render_device_policy = "same-as-compositor"
# decode_device_policy = "same-as-render"
# allow_cross_gpu = false
# Explicit cross-GPU experiments:
# render_device_policy = "nvidia"
# decode_device_policy = "nvidia"
# allow_cross_gpu = true
# present_mode = "mailbox"
# vsync = true
# video_audio = false
#
# [services.wallpaper.sources.hero]
# path = "hero.mp4"
# kind = "video"
# loop = true
# mute = true
#
# [services.wallpaper.views.HDMI-A-3]
# source = "hero"
# fit = "cover"
# crop = { x = 0.0, y = 0.0, width = 0.5, height = 1.0 }
#
# [services.wallpaper.views.eDP-1]
# source = "hero"
# fit = "cover"
# crop = { x = 0.5, y = 0.0, width = 0.5, height = 1.0 }

# ---------------------------------------------------------------------------
# Network — wpa_supplicant control socket path
# Adjust the interface name if yours differs (e.g. wlan0, wlp3s0).
# Wi-Fi enable/disable and airplane-mode actions are implemented via `rfkill`
# at runtime; no extra config is needed, but the `rfkill` command must exist in PATH.
# ---------------------------------------------------------------------------

[services.network]
wpa_ctrl_path = "/run/wpa_supplicant/wlo1"
